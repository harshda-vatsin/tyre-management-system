# EBTMS Nginx site config.
#
# Install to /etc/nginx/sites-available/ebtms and symlink into
# sites-enabled (see README "VM Deployment" section for exact commands).
#
# Replace before use:
#   server_name   -> your VM's domain name or public IP
#
# Both upstreams are PM2-managed Node processes bound to 127.0.0.1 (see
# ../ecosystem.config.js) -- neither port needs to be reachable from outside
# the VM, so this is the only public entry point (backend port 4000 and
# frontend port 3000 should NOT be opened in the VM firewall).
#
# The app does not use cookies (JWT is sent as a Bearer header, stored in
# the browser's localStorage) and frontend/backend are served through this
# single Nginx origin, so no CORS configuration is required here.
#
# HTTPS: this file is HTTP-only (port 80). Everything in the app works over
# plain HTTP EXCEPT the QR camera scanner (/scan) -- browsers only grant
# camera access (getUserMedia) in a secure context (HTTPS, or localhost).
# Over plain HTTP on a domain or IP, /scan degrades gracefully to its
# built-in manual tyre-lookup fallback instead of crashing, but the camera
# itself will not start. Once you have a domain pointed at this VM, run
# `sudo certbot --nginx -d yourdomain.com` (after installing certbot) to add
# HTTPS and enable camera scanning -- Let's Encrypt cannot issue a
# certificate for a bare IP address, so a domain is required for this step.

server {
    listen 80;
    server_name YOUR_DOMAIN_OR_VM_IP;

    # Bulk CSV import endpoint accepts files up to 5MB (see
    # backend/src/routes/imports.js) -- keep this above that limit.
    client_max_body_size 10M;

    # Reverse proxy to the Node/Express backend (PM2 process "ebtms-backend").
    # Must come before the frontend location so /api/* is never captured by
    # the frontend proxy_pass below.
    location /api/ {
        proxy_pass http://127.0.0.1:4000/api/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Reverse proxy to the Next.js production server (PM2 process
    # "ebtms-frontend", `next start`). Next.js owns its own routing
    # (including the dynamic /tyres/[id], /buses/[id], /alerts/[id] pages,
    # which are server-rendered on demand -- not static files), so this is a
    # plain reverse proxy, not a static-file try_files block.
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # Required for Next.js dev/HMR websocket and safe to keep in
        # production in case it's ever needed by a future Next.js feature.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
